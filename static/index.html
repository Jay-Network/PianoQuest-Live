function renderTree(parent, items) {
  items.forEach(function(item) {
    if (item.type === 'folder') {
      var folder = document.createElement('div');
      folder.className = 'score-tree-folder';
      var name = document.createElement('div');
      name.className = 'score-tree-folder-name';
      name.innerHTML = '<span style="font-size:10px;">&#128193;</span> ' + item.name;
      var children = document.createElement('div');
      children.className = 'score-tree-children';
      name.onclick = function() { children.style.display = children.style.display === 'none' ? '' : 'none'; };
      folder.appendChild(name);
      folder.appendChild(children);
      renderTree(children, item.children);
      parent.appendChild(folder);
    } else {
      var file = document.createElement('div');
      file.className = 'score-tree-file';
      file.innerHTML = '<span style="font-size:10px;">&#9835;</span> ' + item.name;
      file.onclick = function() {
        document.querySelectorAll('.score-tree-file.active').forEach(function(f) { f.classList.remove('active'); });
        file.classList.add('active');
        loadScore(item.path);
      };
      parent.appendChild(file);
    }
  });
}

function loadScore(filePath) {
  fetch('/sheets/' + filePath).then(function(r) { return r.json(); }).then(function(score) {
    currentScore = score;
    var preview = document.getElementById('scorePreview');
    preview.style.display = '';
    var info = document.getElementById('scoreInfo');
    info.innerHTML = '<div class="title">' + score.title + '</div>' +
      '<div class="composer">' + score.composer + '</div>' +
      '<div class="meta">' + score.key + ' &middot; ' + score.timeSig + ' &middot; &#9833; = ' + score.tempo + '</div>';
    drawScorePreview(score);
  });
}

function drawScorePreview(score) {
  var canvas = document.getElementById('scoreCanvas');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  if (!rect.width) return;
  var measuresPerLine = 2;
  var lineH = 90;
  var lines = Math.ceil(score.measures.length / measuresPerLine);
  var totalH = lines * lineH + 20;
  canvas.width = rect.width * dpr;
  canvas.height = totalH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var W = rect.width;

  ctx.clearRect(0, 0, W, totalH);
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, totalH);

  var staffSpacing = 6;
  var measureW = (W - 20) / measuresPerLine;

  for (var line = 0; line < lines; line++) {
    var baseY = line * lineH + 20;

    // Draw treble staff lines
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 0.5;
    for (var s = 0; s < 5; s++) {
      var y = baseY + s * staffSpacing;
      ctx.beginPath(); ctx.moveTo(10, y); ctx.lineTo(W - 10, y); ctx.stroke();
    }
    // Bass staff
    var bassBaseY = baseY + 5 * staffSpacing + 10;
    for (var s = 0; s < 5; s++) {
      var y = bassBaseY + s * staffSpacing;
      ctx.beginPath(); ctx.moveTo(10, y); ctx.lineTo(W - 10, y); ctx.stroke();
    }

    // Clef symbols
    ctx.fillStyle = '#888';
    ctx.font = '18px serif';
    ctx.fillText('\uD834\uDD1E', 2, baseY + 3 * staffSpacing + 2); // treble clef
    ctx.font = '14px serif';
    ctx.fillText('\uD834\uDD22', 2, bassBaseY + 2 * staffSpacing + 2); // bass clef

    // Draw notes for each measure in this line
    for (var m = 0; m < measuresPerLine; m++) {
      var mIdx = line * measuresPerLine + m;
      if (mIdx >= score.measures.length) break;
      var measure = score.measures[mIdx];
      var mX = 10 + m * measureW;

      // Measure bar line
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(mX + measureW, baseY);
      ctx.lineTo(mX + measureW, bassBaseY + 4 * staffSpacing);
      ctx.stroke();

      // Draw notes
      var beatsInMeasure = score.beatsPerMeasure || parseInt(score.timeSig.split('/')[0]);
      measure.notes.forEach(function(note) {
        var noteX = mX + 16 + (note.beat / beatsInMeasure) * (measureW - 24);
        // Use clef field to force staff, else auto by MIDI
        var forceBass = note.clef === 'bass';
        var noteY = forceBass
          ? scoreNoteY(note.midi, bassBaseY - 100, bassBaseY, staffSpacing) // force bass rendering
          : scoreNoteY(note.midi, baseY, bassBaseY, staffSpacing);

        // Color mode: velocity-based coloring
        if (scoreColorMode) {
          var vel = note.vel || 80;
          ctx.fillStyle = dynamicsColor(vel);
        } else {
          ctx.fillStyle = note.clef === 'bass' ? '#999999' : '#DDDDDD';
        }

        // Accidental symbol
        if (note.acc) {
          ctx.font = '10px serif';
          ctx.fillText(note.acc === '#' ? '\u266F' : '\u266D', noteX - 10, noteY + 3);
        }

        // Note head — filled for short, hollow for long
        ctx.beginPath();
        ctx.ellipse(noteX, noteY, 4, 3, -0.3, 0, Math.PI * 2);
        if (note.dur >= 2) {
          ctx.strokeStyle = ctx.fillStyle;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        } else {
          ctx.fill();
        }

        // Stem
        ctx.strokeStyle = ctx.fillStyle;
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (noteY > baseY + 2 * staffSpacing) {
          ctx.moveTo(noteX + 3.5, noteY);
          ctx.lineTo(noteX + 3.5, noteY - 20);
        } else {
          ctx.moveTo(noteX - 3.5, noteY);
          ctx.lineTo(noteX - 3.5, noteY + 20);
        }
        ctx.stroke();

        // Ledger lines if needed
        drawScoreLedgerLines(ctx, noteX, noteY, baseY, bassBaseY, staffSpacing);
      });
    }
  }
}

function scoreNoteY(midi, trebleBaseY, bassBaseY, sp) {
  // Map MIDI to staff Y using diatonic coordinate system
  // Treble lines: E4(64)=bottom, F5(77)=top
  // Bass lines: G2(43)=bottom, A3(57)=top
  var NOTE_OFFSETS = { 0:0, 2:1, 4:2, 5:3, 7:4, 9:5, 11:6 }; // C,D,E,F,G,A,B
  var pc = midi % 12;
  var octave = Math.floor(midi / 12) - 1;
  // Black keys map to the lower natural's diatonic position
  var diatonic = NOTE_OFFSETS[pc] !== undefined ? NOTE_OFFSETS[pc] : NOTE_OFFSETS[pc - 1];
  var stepsFromC4 = (octave - 4) * 7 + diatonic;

  // Treble: E4 = step 2, bottom line (trebleBaseY + 4*sp)
  if (trebleBaseY < bassBaseY && midi >= 60) {
    return trebleBaseY + 4 * sp - (stepsFromC4 - 2) * (sp / 2);
  }
  // Bass: D3 = step -5, middle line (bassBaseY + 2*sp)
  return bassBaseY + 2 * sp - (stepsFromC4 + 5) * (sp / 2);
}

function drawScoreLedgerLines(ctx, x, y, trebleBase, bassBase, sp) {
  var trebleBottom = trebleBase + 4 * sp;
  var bassTop = bassBase;
  var bassBottom = bassBase + 4 * sp;
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 0.8;

  // Above treble
  for (var ly = trebleBase - sp; ly >= y - 1; ly -= sp) {
    ctx.beginPath(); ctx.moveTo(x - 6, ly); ctx.lineTo(x + 6, ly); ctx.stroke();
  }
  // Below treble / above bass (middle C area)
  for (var ly = trebleBottom + sp; ly <= y + 1; ly += sp) {
    if (ly < bassTop) {
      ctx.beginPath(); ctx.moveTo(x - 6, ly); ctx.lineTo(x + 6, ly); ctx.stroke();
    }
  }
  // Below bass
  for (var ly = bassBottom + sp; ly <= y + 1; ly += sp) {
    ctx.beginPath(); ctx.moveTo(x - 6, ly); ctx.lineTo(x + 6, ly); ctx.stroke();
  }
}

function loadScoreToTargets() {
  if (!currentScore) return;
  // Clear existing targets
  targetNotes.length = 0;

  var tempo = currentScore.tempo;
  var msPerBeat = 60000 / tempo;
  var timeSigParts = currentScore.timeSig.split('/');
  var beatsPerMeasure = parseInt(timeSigParts[0]);
  var startMs = Date.now() + 2000; // 2 second lead-in

  // Set staff tempo/time sig/scale to match score
  document.getElementById('bpmSlider').value = tempo;
  document.getElementById('bpmVal').textContent = tempo;
  var timeSigSelect = document.getElementById('staffTimeSig');
  for (var i = 0; i < timeSigSelect.options.length; i++) {
    if (timeSigSelect.options[i].value === currentScore.timeSig) {
      timeSigSelect.selectedIndex = i; break;
    }
  }
  var scaleSelect = document.getElementById('staffScale');
  for (var i = 0; i < scaleSelect.options.length; i++) {
    if (scaleSelect.options[i].value === currentScore.key) {
      scaleSelect.selectedIndex = i; break;
    }
  }

  currentScore.measures.forEach(function(measure, mIdx) {
    var measureStartMs = startMs + mIdx * beatsPerMeasure * msPerBeat;
    measure.notes.forEach(function(note) {
      targetNotes.push({
        midi: note.midi,
        arriveMs: measureStartMs + note.beat * msPerBeat,
        durationBeats: note.dur,
        hit: false
      });
    });
  });

  // Update button
  document.getElementById('scoreLoadBtn').classList.add('active');
  document.getElementById('scoreLoadBtn').textContent = 'Loaded (' + targetNotes.length + ' notes)';
  setTimeout(function() {
    document.getElementById('scoreLoadBtn').classList.remove('active');
    document.getElementById('scoreLoadBtn').textContent = 'Load as Target Notes';
  }, 3000);
}

// Score panel resize handle
(function() {
  var handle = document.getElementById('scoreResizeHandle');
  var col = document.getElementById('scoreCol');
  var main = document.querySelector('.main');
  if (!handle || !col || !main) return;
  var dragging = false;
  handle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var mainRect = main.getBoundingClientRect();
    var newW = mainRect.right - e.clientX;
    newW = Math.max(200, Math.min(newW, mainRect.width * 0.6));
    main.style.gridTemplateColumns = '260px 1fr ' + Math.round(newW) + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

    if (dev.roles.mic) { var t = document.createElement('span'); t.className = 'role-tag mic'; t.textContent = 'MIC'; tags.appendChild(t); }
    if (dev.roles.camera) { var t = document.createElement('span'); t.className = 'role-tag cam'; t.textContent = 'CAM'; tags.appendChild(t); }
    if (dev.roles.midi) { var t = document.createElement('span'); t.className = 'role-tag midi'; t.textContent = 'MIDI'; tags.appendChild(t); }
    item.appendChild(tags);

    container.appendChild(item);
  });
}

function copyRoomLink() {
  if (!myRoomCode) return;
  var url = location.origin + '/?room=' + myRoomCode;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      var btn = document.querySelector('.room-code-bar .mini-btn');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy Link'; }, 1500); }
    });
  }
}

function toggleQr() {
  var panel = document.getElementById('qrPanel');
  panel.style.display = panel.style.display === 'none' ? '' : 'none';
}

function updateQr(roomCode) {
  var joinUrl = location.origin + '/?room=' + roomCode;
  var apiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(joinUrl);
  document.getElementById('qrImg').src = apiUrl;
}

// ============================================================================
// Secondary Device Mode — ?room=CODE
// ============================================================================
(function() {
  var params = new URLSearchParams(window.location.search);
  var room = params.get('room');
  if (!room) return;
  // Don't activate if spectator or camera legacy mode
  if (params.get('spectator') === '1' || params.get('camera') === '1') return;

  isSecondaryDevice = true;
  myRoomCode = room;

  // Replace page with secondary device UI using safe DOM methods
  while (document.body.firstChild) document.body.removeChild(document.body.firstChild);

  var app = document.createElement('div');
  app.className = 'secondary-app';

  var header = document.createElement('div');
  header.className = 'secondary-header';
  var h2 = document.createElement('h2');
  var pianoText = document.createTextNode('Piano');
  var questSpan = document.createElement('span');
  questSpan.style.color = 'var(--accent)';
  questSpan.textContent = 'Quest';
  h2.appendChild(pianoText);
  h2.appendChild(questSpan);
  header.appendChild(h2);
  var roomLabel = document.createElement('div');
  roomLabel.className = 'secondary-room-code';
  var roomPrefix = document.createTextNode('Room: ');
  var roomBold = document.createElement('b');
  roomBold.textContent = room;
  roomLabel.appendChild(roomPrefix);
  roomLabel.appendChild(roomBold);
  header.appendChild(roomLabel);
  app.appendChild(header);

  var statusEl = document.createElement('div');
  statusEl.className = 'secondary-status';
  statusEl.id = 'secondaryStatus';
  statusEl.textContent = 'Connecting...';
  app.appendChild(statusEl);

  var rolesContainer = document.createElement('div');
  rolesContainer.className = 'secondary-roles';
  rolesContainer.id = 'secondaryRoles';

  var roleConfigs = [
    { key: 'mic', icon: '\uD83C\uDF99\uFE0F', name: 'MIC' },
    { key: 'midi', icon: '\uD83C\uDFB9', name: 'MIDI' }
  ];
  roleConfigs.forEach(function(rc) {
    var card = document.createElement('div');
    card.className = 'secondary-role-card';
    card.id = 'secRole_' + rc.key;
    var iconEl = document.createElement('div');
    iconEl.className = 'role-icon';
    iconEl.textContent = rc.icon;
    card.appendChild(iconEl);
    var nameEl = document.createElement('div');
    nameEl.className = 'role-name';
    nameEl.textContent = rc.name;
    card.appendChild(nameEl);
    var statusLine = document.createElement('div');
    statusLine.className = 'role-status';
    statusLine.textContent = 'Inactive';
    statusLine.id = 'secRoleStatus_' + rc.key;
    card.appendChild(statusLine);
    rolesContainer.appendChild(card);
  });
  app.appendChild(rolesContainer);

  document.body.appendChild(app);

  // Audio playback context for secondary (to hear agent)
  var secPlaybackCtx = null;
  var secNextPlayTime = 0;

  // Hardware state
  var secMediaStream = null;
  var secAudioCtx = null;
  var secProcessor = null;
  var secMidiAccess = null;
  var secMidiInput = null;

  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var roleHint = params.get('role') || '';
  var wsUrl = proto + '://' + location.host + '/ws/session?room=' + encodeURIComponent(room);
  if (roleHint) wsUrl += '&role=' + encodeURIComponent(roleHint);
  var secWs = new WebSocket(wsUrl);
  ws = secWs;
  secWs.binaryType = 'arraybuffer';

  secWs.onopen = function() {
    statusEl.textContent = 'Connected \u2014 waiting for role assignment';
    statusEl.style.color = 'var(--green)';
  };

  secWs.onmessage = function(event) {
    if (event.data instanceof ArrayBuffer) {
      if (!secPlaybackCtx) secPlaybackCtx = new AudioContext({ sampleRate: 24000 });
      var i16 = new Int16Array(event.data);
      var f32 = new Float32Array(i16.length);
      for (var i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
      var buf = secPlaybackCtx.createBuffer(1, f32.length, 24000);
      buf.getChannelData(0).set(f32);
      var src = secPlaybackCtx.createBufferSource();
      src.buffer = buf;
      src.connect(secPlaybackCtx.destination);
      var now = secPlaybackCtx.currentTime;
      var startAt = Math.max(now + 0.01, secNextPlayTime);
      src.start(startAt);
      secNextPlayTime = startAt + buf.duration;
      return;
    }

    var msg = JSON.parse(event.data);

    if (msg.type === 'you_are_secondary') {
      myDeviceId = msg.deviceId;
      statusEl.textContent = 'Connected as ' + msg.deviceType;
    } else if (msg.type === 'role_assigned') {
      myRoles = msg.roles;
      updateSecondaryRoles();
    } else if (msg.type === 'device_list') {
      deviceList = msg.devices || [];
      for (var d = 0; d < deviceList.length; d++) {
        if (deviceList[d].id === myDeviceId) {
          myRoles = deviceList[d].roles;
          updateSecondaryRoles();
          break;
        }
      }
    } else if (msg.type === 'room_closed' || msg.type === 'error') {
      statusEl.textContent = msg.message || 'Room closed';
      statusEl.style.color = 'var(--rose)';
      stopSecondaryHardware();
    }
  };

  secWs.onclose = function() {
    statusEl.textContent = 'Disconnected';
    statusEl.style.color = 'var(--rose)';
    stopSecondaryHardware();
  };

  var prevRoles = { mic: false, midi: false };

  function updateSecondaryRoles() {
    ['mic', 'midi'].forEach(function(role) {
      var card = document.getElementById('secRole_' + role);
      var rstatus = document.getElementById('secRoleStatus_' + role);
      if (!card || !rstatus) return;
      if (myRoles[role]) {
        card.className = 'secondary-role-card active';
        rstatus.textContent = 'Active';
      } else {
        card.className = 'secondary-role-card';
        rstatus.textContent = 'Inactive';
      }
    });

    if (myRoles.mic && !prevRoles.mic) { startSecondaryMic(); startSecondarySpeechRec(); }
    if (!myRoles.mic && prevRoles.mic) { stopSecondaryMic(); stopSecondarySpeechRec(); }
    if (myRoles.midi && !prevRoles.midi) startSecondaryMidi();
    if (!myRoles.midi && prevRoles.midi) stopSecondaryMidi();

    prevRoles = { mic: myRoles.mic, midi: myRoles.midi };

    if (myRoles.mic || myRoles.midi) {
      var active = [];
      if (myRoles.mic) active.push('Microphone');
      if (myRoles.midi) active.push('MIDI');
      statusEl.textContent = active.join(' + ') + ' active';
    } else {
      statusEl.textContent = 'Connected \u2014 waiting for role assignment';
    }
  }

  function startSecondaryMic() {
    navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 }
    }).then(function(stream) {
      secMediaStream = stream;
      secAudioCtx = new AudioContext();
      var nativeRate = secAudioCtx.sampleRate;
      var source = secAudioCtx.createMediaStreamSource(stream);
      secProcessor = secAudioCtx.createScriptProcessor(4096, 1, 1);
      source.connect(secProcessor);
      secProcessor.connect(secAudioCtx.destination);
      var ratio = nativeRate / 16000;
      secProcessor.onaudioprocess = function(e) {
        if (!secWs || secWs.readyState !== WebSocket.OPEN || !myRoles.mic) return;
        var f32arr = e.inputBuffer.getChannelData(0);
        var sum2 = 0;
        for (var j = 0; j < f32arr.length; j++) sum2 += f32arr[j] * f32arr[j];
        if (Math.sqrt(sum2 / f32arr.length) < 0.01) return;
        var outLen = Math.floor(f32arr.length / ratio);
        var pcm16 = new Int16Array(outLen);
        for (var k = 0; k < outLen; k++) {
          var srcIdx = Math.floor(k * ratio);
          pcm16[k] = Math.max(-32768, Math.min(32767, Math.round(f32arr[srcIdx] * 32767)));
        }
        secWs.send(pcm16.buffer);
      };
    }).catch(function(err) {
      statusEl.textContent = 'Mic error: ' + err.message;
    });
  }

  function stopSecondaryMic() {
    if (secProcessor) { secProcessor.disconnect(); secProcessor = null; }
    if (secAudioCtx) { secAudioCtx.close(); secAudioCtx = null; }
    if (secMediaStream) {
      secMediaStream.getAudioTracks().forEach(function(t) { t.stop(); });
      if (!myRoles.camera) { secMediaStream = null; }
    }
  }

  function startSecondaryMidi() {
    if (!navigator.requestMIDIAccess) {
      statusEl.textContent = 'Web MIDI not supported on this device';
      return;
    }
    navigator.requestMIDIAccess().then(function(access) {
      secMidiAccess = access;
      var inputs = Array.from(access.inputs.values());
      if (inputs.length > 0) {
        secMidiInput = inputs[0];
        secMidiInput.onmidimessage = function(midiEvent) {
          handleMidiMessage(midiEvent);
        };
        statusEl.textContent = 'MIDI: ' + (secMidiInput.name || 'Connected');
      }
    }).catch(function(err) {
      statusEl.textContent = 'MIDI error: ' + err.message;
    });
  }

  function stopSecondaryMidi() {
    if (secMidiInput) { secMidiInput.onmidimessage = null; secMidiInput = null; }
  }

  var secSpeechRec = null;

  function startSecondarySpeechRec() {
    var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) return;
    secSpeechRec = new SpeechRec();
    secSpeechRec.lang = 'en-US';
    secSpeechRec.continuous = true;
    secSpeechRec.interimResults = false;
    secSpeechRec.onresult = function(e) {
      for (var i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          var text = e.results[i][0].transcript.trim();
          if (text && secWs && secWs.readyState === WebSocket.OPEN) {
            secWs.send(JSON.stringify({ type: 'user_speech_transcript', text: text }));
          }
        }
      }
    };
    secSpeechRec.onend = function() {
      if (myRoles.mic && secSpeechRec) {
        try { secSpeechRec.start(); } catch(e) {}
      }
    };
    secSpeechRec.onerror = function(e) {
      console.log('Secondary SpeechRecognition error:', e.error);
    };
    try { secSpeechRec.start(); } catch(e) {}
  }

  function stopSecondarySpeechRec() {
    if (secSpeechRec) {
      var sr = secSpeechRec;
      secSpeechRec = null;
      try { sr.stop(); } catch(e) {}
    }
  }

  function stopSecondaryHardware() {
    stopSecondaryMic();
    stopSecondaryMidi();
    stopSecondarySpeechRec();
  }
})();

// ============================================================================
// Spectator Mode — ?spectator=1
// ============================================================================
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('spectator') !== '1') return;

  // Hide controls that spectators don't need
  var controls = document.querySelector('.controls');
  if (controls) controls.style.display = 'none';

  // Update header to show spectator mode
  var headerSub = document.querySelector('.header-sub');
  if (headerSub) headerSub.textContent = 'SPECTATOR MODE';

  // Auto-connect to /ws/spectator
  setStatus('connecting');
  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var wsUrl = proto + '://' + location.host + '/ws/spectator';
  var specWs = new WebSocket(wsUrl);

  // Audio playback context for spectator
  var specPlaybackCtx = new AudioContext({ sampleRate: 24000 });
  var specNextPlayTime = 0;

  specWs.binaryType = 'arraybuffer';

  specWs.onopen = function() {
    setStatus('connected');
  };

  specWs.onmessage = function(event) {
    if (event.data instanceof ArrayBuffer) {
      // Audio playback
      var i16 = new Int16Array(event.data);
      var f32 = new Float32Array(i16.length);
      for (var i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
      var buf = specPlaybackCtx.createBuffer(1, f32.length, 24000);
      buf.getChannelData(0).set(f32);
      var src = specPlaybackCtx.createBufferSource();
      src.buffer = buf;
      src.connect(specPlaybackCtx.destination);
      var now = specPlaybackCtx.currentTime;
      var startAt = Math.max(now + 0.05, specNextPlayTime);
      src.start(startAt);
      specNextPlayTime = startAt + buf.duration;
    } else {
      var msg = JSON.parse(event.data);
      if (msg.type === 'story_scene' || msg.type === 'achievement' ||
          msg.type === 'coaching_focus' || msg.type === 'quest_advance' ||
          msg.type === 'technique_report') {
        handleToolEvent(msg);
      }
    }
  };

  specWs.onclose = function() {
    setStatus('disconnected');
  };
})();

</script>
