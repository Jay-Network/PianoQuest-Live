<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PianoQuest Live</title>
<style>
  :root {
    --bg: #000000;
    --bg2: #0a0a0a;
    --bg3: #111111;
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --text1: #ffffff;
    --text2: rgba(255,255,255,0.60);
    --text3: rgba(255,255,255,0.40);
    --accent: #ffffff;
    --accent-subtle: rgba(255,255,255,0.06);
    --accent-border: rgba(255,255,255,0.15);
    --purple: #a0a0a0;
    --rose: #fb7185;
    --blue: #93c5fd;
    --green: #86efac;
    --gemini: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100%;
  }
  .app {
    max-width: 1920px;
    margin: 0 auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .header h1 span { color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; }

  .controls { display: flex; gap: 10px; align-items: center; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #444;
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--rose); }
  .status-label { font-size: 12px; color: var(--text3); }
  .gemini-speaking {
    display: flex; align-items: center; gap: 4px; padding: 2px 8px;
    border-radius: 10px; background: rgba(255,255,255,0.06); font-size: 11px; color: var(--text2);
  }
  .gemini-speaking .vol-bar {
    width: 40px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;
  }
  .gemini-speaking .vol-fill {
    height: 100%; width: 0%; background: var(--green); border-radius: 3px; transition: width 0.05s;
  }
  .gemini-speaking.active { color: var(--text1); }
  .gemini-speaking.active .vol-fill { background: var(--green); }
  button {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: var(--bg3); border-color: rgba(255,255,255,0.15); }
  button.primary {
    background: #ffffff; border-color: #ffffff; color: #000000; font-weight: 600;
  }
  button.primary:hover { background: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.85); }
  button.secondary {
    background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.25); color: var(--blue);
  }
  button.secondary:hover { background: rgba(96,165,250,0.2); }
  button.danger {
    background: rgba(251,113,133,0.1); border-color: rgba(251,113,133,0.25); color: var(--rose);
  }
  button:disabled { opacity: 0.4; cursor: default; }

  /* Main grid */
  .main {
    display: grid;
    grid-template-columns: 260px 1fr 560px;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }

  /* Left column */
  .left-col { display: flex; flex-direction: column; gap: 12px; min-height: 0; overflow: hidden; position: relative; }
  .left-resize-handle {
    position: absolute; right: -4px; top: 0; bottom: 0; width: 8px;
    cursor: col-resize; z-index: 10;
  }
  .left-resize-handle:hover, .left-resize-handle.dragging {
    background: rgba(255,255,255,0.08);
  }

  .panel {
    border-radius: 12px; border: 1px solid var(--border);
    background: var(--bg2); overflow: hidden;
  }
  .panel-header {
    padding: 8px 12px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.04em; color: var(--text2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .panel-header .dot { width: 5px; height: 5px; border-radius: 50%; }

  /* Camera */
  .level-meter {
    padding: 6px 12px; display: flex; align-items: center; gap: 6px;
  }
  .level-bar-bg {
    flex: 1; height: 3px; background: rgba(255,255,255,0.05);
    border-radius: 2px; overflow: hidden;
  }
  .level-bar {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 2px; transition: width 0.05s;
  }
  .level-label { font-size: 9px; color: var(--text3); min-width: 20px; text-align: right; }

  /* Coaching Focus Card */
  .coaching-card { padding: 12px; }
  .coaching-focus {
    font-size: 12px; color: var(--text2); line-height: 1.5;
    min-height: 36px;
  }
  .coaching-focus .focus-label {
    font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
    color: var(--gemini); margin-bottom: 4px;
  }

  /* Right column */
  .right-col { display: flex; flex-direction: column; gap: 8px; min-height: 0; }

  /* Piano MIDI stack */
  .midi-stack { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; flex: 1; min-height: 0; }
  .midi-header-tools {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .midi-status {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }
  .pedal-pill {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
  }
  .pedal-pill.active {
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--accent);
  }
  .midi-select {
    min-width: 180px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-size: 12px;
  }
  .midi-select:focus { outline: 1px solid rgba(96,165,250,0.35); }
  .mini-btn {
    padding: 6px 10px;
    font-size: 11px;
    background: var(--bg3);
  }
  .roll-wrap {
    padding: 0;
    background: #0a0a0a;
  }
  .keyboard-wrap {
    padding: 0;
    background: #0a0a0a;
  }
  .staff-wrap canvas,
  .roll-wrap canvas,
  .keyboard-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .keyboard-hint {
    padding: 8px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.03em;
  }
  .bpm-control { display: flex; align-items: center; gap: 6px; }
  .bpm-control label { font-size: 9px; color: var(--text3); }
  .bpm-control input[type=range] { width: 74px; accent-color: var(--green); }
  .bpm-control .bpm-val { font-size: 10px; color: var(--green); min-width: 20px; }


  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .score-col { display: none; }
    .quest-map { overflow-x: auto; }
    .midi-header-tools {
      width: 100%;
      margin-left: 0;
      justify-content: flex-start;
    }
  }

  /* Devices panel */
  .devices-content { padding: 8px 10px; }
  .device-list-items { display: flex; flex-direction: column; gap: 4px; }
  .device-item {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 6px; border-radius: 6px;
    font-size: 11px; color: var(--text2);
  }
  .device-icon { flex-shrink: 0; }
  .device-name { flex: 1; }
  .device-roles-tags { display: flex; gap: 3px; }
  .role-tag {
    padding: 1px 5px; border-radius: 4px; font-size: 8px; font-weight: 700;
    letter-spacing: 0.04em;
  }
  .role-tag.mic { background: rgba(255,255,255,0.06); color: var(--accent); }
  .role-tag.cam { background: rgba(251,113,133,0.15); color: var(--rose); }
  .role-tag.midi { background: rgba(255,255,255,0.06); color: var(--purple); }
  .room-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text3);
  }
  .room-code {
    font-weight: 700; font-size: 13px; color: var(--accent);
    letter-spacing: 0.08em; font-family: monospace;
  }
  .room-bar .mini-btn { margin-left: auto; padding: 3px 8px; font-size: 9px; }
  .device-count { margin-left: auto; font-weight: 400; color: var(--text3); }

  /* Secondary device mode */
  .secondary-app {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 20px; padding: 24px;
    background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
  }
  .secondary-header { text-align: center; }
  .secondary-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .secondary-header h2 span { color: var(--accent); }
  .secondary-room-code {
    font-size: 11px; color: var(--text3); letter-spacing: 0.04em;
  }
  .secondary-room-code b {
    font-size: 16px; color: var(--accent); letter-spacing: 0.08em; font-family: monospace;
  }
  .secondary-status {
    font-size: 12px; color: var(--text2); text-align: center;
  }
  .secondary-roles {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .secondary-role-card {
    padding: 16px 24px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--bg2);
    text-align: center; min-width: 100px;
    transition: all 0.3s;
  }
  .secondary-role-card.active {
    border-color: rgba(134,239,172,0.3);
    background: rgba(134,239,172,0.06);
  }
  .secondary-role-card .role-icon { font-size: 28px; margin-bottom: 6px; }
  .secondary-role-card .role-name { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--text2); }
  .secondary-role-card.active .role-name { color: var(--green); }
  .secondary-role-card .role-status { font-size: 9px; color: var(--text3); margin-top: 4px; }
  .secondary-role-card.active .role-status { color: var(--green); }
  /* Score panel (right column) */
  .score-col { display: flex; flex-direction: column; gap: 12px; position: relative; min-height: 0; overflow: hidden; }
  .score-resize-handle {
    position: absolute; left: -4px; top: 0; bottom: 0; width: 8px;
    cursor: col-resize; z-index: 10;
  }
  .score-resize-handle:hover, .score-resize-handle.dragging {
    background: rgba(255,255,255,0.08);
  }
  .score-browser {
    display: flex; flex-direction: column; height: 100%;
  }
  .score-tree {
    flex: 1; overflow-y: auto; padding: 6px 8px; font-size: 11px;
    max-height: 300px;
  }
  .score-tree-folder { padding: 2px 0; }
  .score-tree-folder-name {
    cursor: pointer; font-weight: 700; color: var(--text2);
    padding: 3px 4px; border-radius: 4px; display: flex; align-items: center; gap: 4px;
  }
  .score-tree-folder-name:hover { background: rgba(255,255,255,0.05); }
  .score-tree-children { padding-left: 14px; }
  .score-tree-file {
    cursor: pointer; padding: 3px 8px; border-radius: 4px;
    color: var(--text2); display: flex; align-items: center; gap: 4px;
  }
  .score-tree-file:hover { background: rgba(255,255,255,0.05); color: var(--text1); }
  .score-tree-file.active { background: rgba(255,255,255,0.06); color: var(--accent); }
  .score-preview {
    padding: 8px; border-top: 1px solid var(--border);
  }
  .score-info { font-size: 11px; color: var(--text2); padding: 4px 0; }
  .score-info .title { font-size: 14px; font-weight: 700; color: var(--text1); margin-bottom: 2px; }
  .score-info .composer { font-size: 11px; color: var(--text3); }
  .score-info .meta { font-size: 10px; color: var(--text3); margin-top: 4px; }
  .score-canvas-wrap { background: #050505; border-radius: 6px; margin-top: 6px; }
  .score-canvas-wrap canvas { width: 100%; display: block; }
  .score-actions { display: flex; gap: 6px; padding: 6px 0; }
  .score-actions button {
    flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); font-size: 10px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .score-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .score-actions button.active { border-color: var(--green); color: var(--green); background: rgba(134,239,172,0.08); }

  /* Chat / Conversation */
  .chat-area { scroll-behavior: smooth; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .system-msg { font-size: 11px; color: rgba(255,255,255,0.4); font-style: italic; padding: 12px 0; text-align: center; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .chat-row { display: flex; gap: 6px; animation: msgIn 0.2s ease-out; }
  .chat-row.user { flex-direction: row-reverse; }
  .chat-row.bot { flex-direction: row; }
  .chat-msg {
    max-width: 80%; min-width: 60px; padding: 8px 12px;
    border-radius: 14px; font-size: 13px; line-height: 1.5;
  }
  .chat-msg .msg-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em; margin-bottom: 2px; opacity: 0.5;
  }
  .chat-msg .msg-time {
    font-size: 9px; margin-top: 3px; opacity: 0.3; font-variant-numeric: tabular-nums;
  }
  .chat-msg.user {
    background: rgba(147,197,253,0.08); border: 1px solid rgba(147,197,253,0.15);
    border-bottom-right-radius: 4px;
  }
  .chat-msg.user .msg-label { color: var(--blue); }
  .chat-msg.user .msg-text { color: rgba(255,255,255,0.85); }
  .chat-msg.user .msg-time { text-align: right; }
  .chat-msg.bot {
    background: rgba(134,239,172,0.06); border: 1px solid rgba(134,239,172,0.12);
    border-bottom-left-radius: 4px;
  }
  .chat-msg.bot .msg-label { color: var(--green); }
  .chat-msg.bot .msg-text { color: rgba(255,255,255,0.85); }
  .chat-msg.bot .msg-time { text-align: left; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div>
        <h1>Piano<span>Quest</span> Live</h1>
        <div class="header-sub">CREATIVE STORYTELLER &middot; REAL-TIME PIANO COACHING &middot; v2.1.0</div>
      </div>
    </div>
    <div class="controls">
      <select class="midi-select" id="midiInputSelect" aria-label="MIDI input" style="font-size:10px;padding:4px 6px;">
        <option value="">No MIDI input</option>
      </select>
      <span class="pedal-pill" id="pedalStatus">Pedal Up</span>
      <span id="midiStatus" style="display:none;"></span>
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Disconnected</span>
      <div class="gemini-speaking" id="geminiSpeaking">
        <span id="geminiSpeakLabel">Silent</span>
        <div class="vol-bar"><div class="vol-fill" id="geminiVolFill"></div></div>
      </div>
      <button class="primary" id="btnStart" onclick="toggleSession()">Start Session</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">

    <!-- Left column: Camera + Coaching + Badges -->
    <div class="left-col" id="leftCol">
      <div class="left-resize-handle" id="leftResizeHandle"></div>
      <div class="panel" id="deviceManagerPanel" style="display:none">
        <div class="panel-header">
          <div class="dot" style="background:var(--green)"></div>DEVICES
          <span class="device-count" id="deviceCount">1</span>
        </div>
        <div class="devices-content">
          <div class="device-list-items" id="deviceListItems"></div>
        </div>
        <div class="room-bar">
          Room: <span class="room-code" id="roomCodeDisplay">----</span>
          <button class="mini-btn" type="button" onclick="copyRoomLink()">Copy Link</button>
          <button class="mini-btn" type="button" onclick="toggleQr()">QR</button>
        </div>
        <div id="qrPanel" style="display:none;text-align:center;padding:8px;background:#050508;border-radius:0 0 8px 8px;">
          <img id="qrImg" style="width:180px;height:180px;border-radius:4px;" alt="QR code">
          <div style="font-size:10px;color:var(--text3);margin-top:4px;">Scan to join this session</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="dot" style="background:var(--accent)"></div>AUDIO LEVEL
        </div>
        <div class="level-meter">
          <div class="dot" style="background:var(--accent);width:5px;height:5px;border-radius:50%"></div>
          <div class="level-bar-bg"><div class="level-bar" id="levelBar"></div></div>
          <div class="level-label" id="levelLabel">0</div>
        </div>
      </div>

      <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:100px;">
        <div class="panel-header">
          <div class="dot" style="background:var(--gemini)"></div>CONVERSATION
        </div>
        <div class="chat-area" id="chatArea" style="flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;">
          <div class="system-msg" style="font-size:11px;color:var(--text3);text-align:center;padding:12px;">Start a session to begin conversation</div>
        </div>
      </div>

    </div>

    <!-- Center column: Scene + MIDI UI -->
    <div class="right-col">

      <div class="midi-stack" id="midiStack">
        <div class="roll-wrap" id="rollWrap" style="background:#0a0a0f;border-radius:12px 12px 0 0;overflow:hidden;">
          <canvas id="pianoRollCanvas"></canvas>
        </div>
        <div class="keyboard-wrap" id="keyboardWrap" style="background:#0a0a0a;">
          <canvas id="keyboardCanvas"></canvas>
        </div>
        <div class="staff-wrap" id="staffWrap" style="padding:0;background:#050508;border-radius:0 0 12px 12px;overflow:hidden;">
          <canvas id="grandStaffCanvas"></canvas>
        </div>
      </div>
      <div class="midi-footer" style="display:flex;align-items:center;gap:12px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;">
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);">
          BPM
          <input type="range" id="bpmSlider" min="40" max="300" value="90" style="width:80px;height:14px;">
          <span id="bpmVal" style="font-size:11px;color:var(--text1);min-width:24px;">90</span>
        </label>
        <select id="staffTimeSig" title="Time signature" style="font-size:11px;padding:2px 4px;background:var(--bg3);border:1px solid var(--border);color:var(--text1);border-radius:4px;">
          <option value="4/4">4/4</option>
          <option value="3/4">3/4</option>
          <option value="2/4">2/4</option>
          <option value="6/8">6/8</option>
        </select>
        <select id="staffScale" title="Scale" style="font-size:11px;padding:2px 4px;background:var(--bg3);border:1px solid var(--border);color:var(--text1);border-radius:4px;">
          <option value="C major">C</option>
          <option value="G major">G</option>
          <option value="D major">D</option>
          <option value="A major">A</option>
          <option value="E major">E</option>
          <option value="B major">B</option>
          <option value="F major">F</option>
          <option value="Bb major">Bb</option>
          <option value="Eb major">Eb</option>
          <option value="Ab major">Ab</option>
          <option value="A minor">Am</option>
          <option value="E minor">Em</option>
          <option value="B minor">Bm</option>
          <option value="D minor">Dm</option>
          <option value="G minor">Gm</option>
          <option value="C minor">Cm</option>
          <option value="F minor">Fm</option>
          <option value="F# minor">F#m</option>
          <option value="C# minor">C#m</option>
        </select>
      </div>
    </div>

    <!-- Right column: Score Browser -->
    <div class="score-col" id="scoreCol">
      <div class="score-resize-handle" id="scoreResizeHandle"></div>
      <div class="panel" style="flex:1;display:flex;flex-direction:column;">
        <div class="panel-header">
          <div class="dot" style="background:var(--accent)"></div>SCORE
        </div>
        <div class="score-browser">
          <div class="score-tree" id="scoreTree">
            <div style="color:var(--text3);font-size:10px;">Loading sheets...</div>
          </div>
          <div class="score-preview" id="scorePreview" style="display:none;">
            <div class="score-info" id="scoreInfo"></div>
            <div class="score-canvas-wrap">
              <canvas id="scoreCanvas"></canvas>
            </div>
            <div class="score-actions">
              <button id="scoreLoadBtn" onclick="loadScoreToTargets()">Load as Target Notes</button>
              <button id="scoreColorBtn" onclick="toggleScoreColorMode()">Color Mode</button>
              <button id="scorePlayBtn" onclick="toggleScorePlayback()">Play</button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ============================================================================
// State
// ============================================================================
let ws = null;
let audioCtx = null;
let playbackCtx = null;
let mediaStream = null;
let analyser = null;
let processor = null;
let animFrame = null;

const TOTAL_KEYS = 88;
const FIRST_MIDI = 21;
const WHITE_KEYS_COUNT = 52;
const BLACK_KEY_PATTERN = [false, true, false, true, false, false, true, false, true, false, true, false];
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const DYNAMICS_COLORS = [
  { vel: 0, r: 59, g: 130, b: 246 },
  { vel: 18, r: 59, g: 130, b: 246 },
  { vel: 36, r: 6, g: 182, b: 212 },
  { vel: 54, r: 16, g: 185, b: 129 },
  { vel: 72, r: 234, g: 179, b: 8 },
  { vel: 90, r: 249, g: 115, b: 22 },
  { vel: 100, r: 239, g: 68, b: 68 },
  { vel: 112, r: 236, g: 72, b: 153 },
  { vel: 127, r: 168, g: 85, b: 247 }
];
const DYNAMICS_LABELS = [
  { vel: 0, label: 'ppp' },
  { vel: 18, label: 'pp' },
  { vel: 36, label: 'p' },
  { vel: 54, label: 'mp' },
  { vel: 72, label: 'mf' },
  { vel: 90, label: 'f' },
  { vel: 112, label: 'ff' },
  { vel: 127, label: 'fff' }
];

// ============================================================================
// MIDI helpers
// ============================================================================
function buildKeyboard() {
  var keys = [];
  var whiteIdx = 0;
  for (var i = 0; i < TOTAL_KEYS; i++) {
    var midi = FIRST_MIDI + i;
    var noteInOctave = midi % 12;
    var isBlack = BLACK_KEY_PATTERN[noteInOctave];
    keys.push({ midi: midi, isBlack: isBlack, whiteIndex: isBlack ? whiteIdx - 1 : whiteIdx });
    if (!isBlack) whiteIdx++;
  }
  return keys;
}

function noteName(note) {
  return NOTE_NAMES[note % 12] + (Math.floor(note / 12) - 1);
}

function detectTechniques() {
  var notes = recentMidiNotes.slice(-12).map(function(item) { return item.note; });
  var labels = [];
  if (notes.length < 2) return labels;

  var ascendingRun = 1;
  var descendingRun = 1;
  var repeatedRun = 1;
  var arpeggioRun = 1;

  function pushUnique(label) {
    if (labels.indexOf(label) === -1) labels.push(label);
  }

  for (var i = 1; i < notes.length; i++) {
    var diff = notes[i] - notes[i - 1];
    var absDiff = Math.abs(diff);

    if (diff === 1 || diff === 2) ascendingRun += 1;
    else ascendingRun = 1;

    if (diff === -1 || diff === -2) descendingRun += 1;
    else descendingRun = 1;

    if (ascendingRun >= 4) pushUnique('scale_run_ascending');
    if (descendingRun >= 4) pushUnique('scale_run_descending');

    if (notes[i] === notes[i - 1]) repeatedRun += 1;
    else repeatedRun = 1;

    if (repeatedRun >= 3) {
      pushUnique('repeated_note(' + noteName(notes[i]) + 'x' + repeatedRun + ')');
    }

    if (absDiff === 3 || absDiff === 4) arpeggioRun += 1;
    else arpeggioRun = 1;

    if (arpeggioRun >= 3) pushUnique('arpeggio');
    if (absDiff > 7) pushUnique('wide_leap');
  }

  return labels;
}

function dynamicsRgb(velocity) {
  if (velocity <= DYNAMICS_COLORS[0].vel) return DYNAMICS_COLORS[0];
  for (var i = 1; i < DYNAMICS_COLORS.length; i++) {
    if (velocity <= DYNAMICS_COLORS[i].vel) {
      var lo = DYNAMICS_COLORS[i - 1];
      var hi = DYNAMICS_COLORS[i];
      var t = (velocity - lo.vel) / (hi.vel - lo.vel);
      return {
        r: Math.round(lo.r + (hi.r - lo.r) * t),
        g: Math.round(lo.g + (hi.g - lo.g) * t),
        b: Math.round(lo.b + (hi.b - lo.b) * t)
      };
    }
  }
  return DYNAMICS_COLORS[DYNAMICS_COLORS.length - 1];
}

function dynamicsColor(velocity, alpha) {
  var c = dynamicsRgb(velocity);
  if (alpha == null) return 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
  return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + alpha + ')';
}

function darkenedColor(velocity, factor, alpha) {
  var c = dynamicsRgb(velocity);
  var r = Math.round(c.r * factor);
  var g = Math.round(c.g * factor);
  var b = Math.round(c.b * factor);
  if (alpha == null) return 'rgb(' + r + ',' + g + ',' + b + ')';
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

  div.className = 'chat-msg ' + side;

  var lbl = document.createElement('div');

  div.appendChild(lbl);

}

function resetMidiState() {
  activeNotes.clear();
  fingerDownNotes.clear();
  pedalSustainedNotes.clear();
  noteHistory.length = 0;
  recentMidiNotes.length = 0;
  onsets.length = 0;
  pedalDown = false;
  updatePedalStatus();
}

function updateMidiStatus(text) {
  document.getElementById('midiStatus').textContent = text;
}

function updatePedalStatus() {
  var el = document.getElementById('pedalStatus');
  el.textContent = pedalDown ? 'Pedal Down' : 'Pedal Up';
  el.className = pedalDown ? 'pedal-pill active' : 'pedal-pill';
}

async function refreshMidiInputs() {
  var select = document.getElementById('midiInputSelect');
  if (!navigator.requestMIDIAccess) {
    updateMidiStatus('Web MIDI not supported');
    select.innerHTML = '<option value="">Web MIDI unavailable</option>';
    return;
  }

  try {
    updateMidiStatus('Checking MIDI devices...');
    if (!midiAccess) {
      midiAccess = await navigator.requestMIDIAccess();
      midiAccess.onstatechange = function() { refreshMidiInputs(); };
    }

    var inputs = Array.from(midiAccess.inputs.values());
    select.innerHTML = '';
    if (!inputs.length) {
      select.innerHTML = '<option value="">No MIDI input found</option>';
      if (midiInput) midiInput.onmidimessage = null;
      midiInput = null;
      updateMidiStatus('No MIDI input found');
      return;
    }

    inputs.forEach(function(input) {
      var option = document.createElement('option');
      option.value = input.id;
      option.textContent = input.name || 'MIDI Input';
      select.appendChild(option);
    });

    if (!midiInput || !midiAccess.inputs.has(midiInput.id)) {
      setMidiInput(inputs[0].id);
    } else {
      select.value = midiInput.id;
      updateMidiStatus('MIDI: ' + (midiInput.name || 'Connected'));
    }
  } catch (err) {
    var name = err && err.name ? err.name : 'Error';
    if (name === 'NotAllowedError' || name === 'SecurityError') {
      updateMidiStatus('MIDI permission blocked');
    } else {
      updateMidiStatus('MIDI error: ' + name);
    }
    console.error('Failed to refresh MIDI inputs', err);
  }
}

function setMidiInput(inputId) {
  if (!midiAccess) return;
  if (midiInput) midiInput.onmidimessage = null;
  midiInput = inputId ? midiAccess.inputs.get(inputId) : null;
  if (midiInput) {
    midiInput.onmidimessage = handleMidiMessage;
    document.getElementById('midiInputSelect').value = midiInput.id;
    updateMidiStatus('MIDI: ' + (midiInput.name || 'Connected'));
  } else {
    updateMidiStatus('MIDI not connected');
  }
}

function handleMidiMessage(event) {
  var data = event.data;
  if (!data || data.length < 2) return;

  var status = data[0];
  var command = status & 0xf0;
  var channel = status & 0x0f;
  var data1 = data[1];
  var data2 = data.length > 2 ? data[2] : 0;
  var nowMs = Date.now();

  if (command === 0x90 && data2 > 0) {
    handleNoteOn(data1, data2, nowMs);
    sendMidiEvent({ event: 'noteOn', note: data1, velocity: data2, channel: channel, timestampMs: nowMs });
  } else if (command === 0x80 || (command === 0x90 && data2 === 0)) {
    handleNoteOff(data1, nowMs);
    sendMidiEvent({ event: 'noteOff', note: data1, velocity: data2, channel: channel, timestampMs: nowMs });
  } else if (command === 0xb0) {
    handleControlChange(data1, data2, nowMs);
    sendMidiEvent({ event: 'controlChange', controller: data1, value: data2, channel: channel, timestampMs: nowMs });
  }
}

function handleNoteOn(note, velocity, nowMs) {
  // Close any open history entries for this note (e.g. pedal-sustained re-trigger)
  for (var hi = noteHistory.length - 1; hi >= 0; hi--) {
    if (noteHistory[hi].note === note && noteHistory[hi].endMs === 0) {
      noteHistory[hi].endMs = nowMs;
      if (!noteHistory[hi].fingerDurationMs) noteHistory[hi].fingerDurationMs = nowMs - noteHistory[hi].startMs;
      break;
    }
  }
  activeNotes.set(note, { note: note, velocity: velocity, timestamp: nowMs });
  fingerDownNotes.add(note);
  pedalSustainedNotes.delete(note);
  noteHistory.push({ note: note, velocity: velocity, startMs: nowMs, endMs: 0, fingerDurationMs: 0 });
  if (noteHistory.length > 500) noteHistory.splice(0, noteHistory.length - 500);
  recentMidiNotes.push({ note: note, velocity: velocity, timestampMs: nowMs });
  if (recentMidiNotes.length > 64) recentMidiNotes.splice(0, recentMidiNotes.length - 64);
  onsets.push(nowMs);
  while (onsets.length && nowMs - onsets[0] > 30000) onsets.shift();
  scheduleMidiSnapshot();
}

function handleNoteOff(note, nowMs) {
  fingerDownNotes.delete(note);

  for (var i = noteHistory.length - 1; i >= 0; i--) {
    var entry = noteHistory[i];
    if (entry.note === note && entry.endMs === 0) {
      entry.fingerDurationMs = Math.max(0, nowMs - entry.startMs);
      if (pedalDown) {
        pedalSustainedNotes.add(note);
      } else {
        entry.endMs = nowMs;
        activeNotes.delete(note);
      }
      break;
    }
  }

  if (!pedalDown) {
    pedalSustainedNotes.delete(note);
    activeNotes.delete(note);
  }

  scheduleMidiSnapshot();
}

function handleControlChange(controller, value, nowMs) {
  if (controller !== 64) return;
  var wasDown = pedalDown;
  pedalDown = value >= 64;
  updatePedalStatus();

  if (wasDown && !pedalDown) {
    pedalSustainedNotes.forEach(function(note) {
      activeNotes.delete(note);
      for (var i = noteHistory.length - 1; i >= 0; i--) {
        var entry = noteHistory[i];
        if (entry.note === note && entry.endMs === 0) {
          entry.endMs = nowMs;
          break;
        }
      }
    });
    pedalSustainedNotes.clear();
  }

  scheduleMidiSnapshot();
}

function sendMidiEvent(payload) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    type: 'midi_event',
    event: payload.event,
    note: payload.note,
    velocity: payload.velocity,
    controller: payload.controller,
    value: payload.value,
    channel: payload.channel,
    timestampMs: payload.timestampMs
  }));
}

function scheduleMidiSnapshot() {
  if (midiSnapshotTimer) clearTimeout(midiSnapshotTimer);
  midiSnapshotTimer = setTimeout(function() {
    sendMidiSnapshot(false);
  }, 250);
}

function sendMidiSnapshot(force) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  var nowMs = Date.now();

  var activePayload = Array.from(activeNotes.values()).map(function(note) {
    return { note: note.note, velocity: note.velocity };
  });
  var recentPayload = recentMidiNotes
    .filter(function(note) { return nowMs - note.timestampMs < 2500; })
    .slice(-8)
    .map(function(note) { return { note: note.note, velocity: note.velocity }; });

  var hasPerformanceSignal = activePayload.length > 0 || recentPayload.length > 0 || pedalDown;
  if (!hasPerformanceSignal) return;
  if (!force && nowMs - lastMidiSnapshotAt < 1200) return;
  lastMidiSnapshotAt = nowMs;

  ws.send(JSON.stringify({
    type: 'midi_snapshot',
    active_notes: activePayload,
    recent_notes: recentPayload,
    detected_techniques: detectTechniques(),
    pedal_down: pedalDown,
    bpm: parseInt(bpmSlider.value, 10) || 90,
    score: currentScore
  }));
}

// ============================================================================
// Session management
// ============================================================================
function toggleSession() {
  if (sessionActive) { stopSession(); return; }
  startSession();
}
async function startSession() {
  sessionActive = true;
  var btn = document.getElementById('btnStart');
  btn.textContent = 'Stop Session';
  btn.className = 'danger';
  setStatus('connecting');

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1
      },
      video: false
    });

    audioCtx = new AudioContext();
    var nativeRate = audioCtx.sampleRate;
    var source = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    source.connect(analyser);
    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    source.connect(processor);
    processor.connect(audioCtx.destination);

    playbackCtx = new AudioContext({ sampleRate: 24000 });
    nextPlayTime = 0;
    var downsampleRatio = nativeRate / 16000;
    processor.onaudioprocess = function(e) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (playbackCtx && playbackCtx.currentTime < playbackActiveUntil) return;
      var f32 = e.inputBuffer.getChannelData(0);
      // Energy gate: skip silent chunks so Gemini detects end-of-speech
      var sum = 0;
      for (var j = 0; j < f32.length; j++) sum += f32[j] * f32[j];
      var rms = Math.sqrt(sum / f32.length);
      if (rms < 0.01) return;
      var outLen = Math.floor(f32.length / downsampleRatio);
      var pcm16 = new Int16Array(outLen);
      for (var i = 0; i < outLen; i++) {
        var srcIdx = Math.floor(i * downsampleRatio);
        pcm16[i] = Math.max(-32768, Math.min(32767, Math.round(f32[srcIdx] * 32767)));
      }
      ws.send(pcm16.buffer);
    };

    function connectWebSocket(isReconnect) {
      var proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(proto + '://' + location.host + '/ws/session');
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        setStatus('connected');
        reconnectDelay = 1000;
        sessionActive = true;
        if (!isReconnect) {
          sessionStartTime = Date.now();
          resetMidiState();
          currentScore = 0;
        }
        ws.send(JSON.stringify({ type: 'set_mode', mode: 'storyteller' }));
        refreshMidiInputs();

        if (!animFrame) {
          drawLoop();
        }
      };

      ws.onmessage = function(event) {
        if (event.data instanceof ArrayBuffer) {
          queueAudio(event.data);
        } else {
          var msg = JSON.parse(event.data);
          if (msg.type === 'story_scene' || msg.type === 'achievement' ||
                     msg.type === 'coaching_focus' || msg.type === 'quest_advance') {
            handleToolEvent(msg);
          } else if (msg.type === 'you_are_primary') {
            isPrimaryDevice = true;
            myDeviceId = msg.deviceId;
            myRoomCode = msg.room;
            document.getElementById('deviceManagerPanel').style.display = '';
            document.getElementById('roomCodeDisplay').textContent = msg.room;
            updateQr(msg.room);
            startSpeechRecognition();
          } else if (msg.type === 'room_code') {
            myRoomCode = msg.room;
            var label = document.getElementById('statusLabel');
            if (label) label.textContent = 'Connected · Room: ' + msg.room;
          } else if (msg.type === 'device_list') {
            deviceList = msg.devices || [];
            renderDeviceList();
          } else if (msg.type === 'role_assigned') {
            myRoles = msg.roles;
          } else if (msg.type === 'input_transcript') {
            if (msg.text) addMessage(msg.text, 'input');
          } else if (msg.type === 'output_transcript') {
            if (msg.text) addMessage(msg.text, 'output');
          } else if (msg.type === 'midi') {
            // Remote MIDI from Ubuntu bridge — feed into existing visualization
            var nowMs = msg.timestampMs || Date.now();
            if (msg.event === 'noteOn' && msg.velocity > 0) {
              handleNoteOn(msg.note, msg.velocity, nowMs);
            } else if (msg.event === 'noteOff' || (msg.event === 'noteOn' && msg.velocity === 0)) {
              handleNoteOff(msg.note, nowMs);
            } else if (msg.event === 'controlChange') {
              handleControlChange(msg.controller || msg.note, msg.value || msg.velocity, nowMs);
            }
            updateMidiStatus('MIDI (remote bridge)');
          }
        }
      };

      ws.onclose = function() {
        setStatus('disconnected');
        if (sessionActive) {
          setTimeout(function() {
            if (!sessionActive) return;
            reconnectDelay = Math.min(reconnectDelay * 2, 30000);
            connectWebSocket(true);
          }, reconnectDelay);
        }
      };

      ws.onerror = function() { setStatus('error'); };
    }

    connectWebSocket(false);

  } catch (err) {
    console.error('Failed to start session:', err);
    setStatus('error');
    resetStartButton();
  }
}

function resetStartButton() {
  sessionActive = false;
  var btn = document.getElementById('btnStart');
  btn.textContent = 'Start Session';
  btn.className = 'primary';
}

// ============================================================================
// Web Speech API — browser-side speech-to-text for user transcript
// ============================================================================
var speechRecognition = null;

function startSpeechRecognition() {
  var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) { console.log('SpeechRecognition not supported'); return; }
  speechRecognition = new SpeechRec();
  speechRecognition.lang = 'en-US';
  speechRecognition.continuous = true;
  speechRecognition.interimResults = false;
  speechRecognition.onresult = function(e) {
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        var text = e.results[i][0].transcript.trim();
        if (text && ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'user_speech_transcript', text: text }));
        }
      }
    }
  };
  speechRecognition.onend = function() {
    // Auto-restart — Chrome and Safari can stop unexpectedly
    if (sessionActive && speechRecognition) {
      try { speechRecognition.start(); } catch(e) {}
    }
  };
  speechRecognition.onerror = function(e) {
    console.log('SpeechRecognition error:', e.error);
  };
  try { speechRecognition.start(); } catch(e) {}
}

function stopSpeechRecognition() {
  if (speechRecognition) {
    var sr = speechRecognition;
    speechRecognition = null;
    try { sr.stop(); } catch(e) {}
  }
}

function stopSession() {
  sessionActive = false;
  stopSpeechRecognition();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'close' }));
    ws.close();
  }
  ws = null;
  if (midiSnapshotTimer) { clearTimeout(midiSnapshotTimer); midiSnapshotTimer = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  if (processor) { processor.disconnect(); processor = null; }
  if (analyser) { analyser.disconnect(); analyser = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (playbackCtx) { playbackCtx.close(); playbackCtx = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(function(t) { t.stop(); }); mediaStream = null; }
  resetStartButton();
  resetMidiState();
  setStatus('disconnected');
}

// ============================================================================
// Audio playback
// ============================================================================
function queueAudio(arrayBuf) {
  if (!playbackCtx) return;
  var int16 = new Int16Array(arrayBuf);
  var float32 = new Float32Array(int16.length);
  var rms = 0;
  for (var i = 0; i < int16.length; i++) {
    float32[i] = int16[i] / 32768;
    rms += float32[i] * float32[i];
  }
  rms = Math.sqrt(rms / int16.length);
  // Update speaking indicator
  var speakEl = document.getElementById('geminiSpeaking');
  var labelEl = document.getElementById('geminiSpeakLabel');
  var fillEl = document.getElementById('geminiVolFill');
  if (speakEl && fillEl) {
    speakEl.className = 'gemini-speaking active';
    labelEl.textContent = 'Speaking';
    fillEl.style.width = Math.min(100, rms * 500) + '%';
  }
  var buffer = playbackCtx.createBuffer(1, float32.length, 24000);
  buffer.copyToChannel(float32, 0);
  var src = playbackCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(playbackCtx.destination);
  var now = playbackCtx.currentTime;
  var startTime = Math.max(now + 0.01, nextPlayTime);
  src.start(startTime);
  nextPlayTime = startTime + buffer.duration;
  playbackActiveUntil = nextPlayTime + 0.2;
  // Reset indicator when playback ends
  src.onended = function() {
    if (playbackCtx && playbackCtx.currentTime >= playbackActiveUntil - 0.25) {
      if (speakEl) speakEl.className = 'gemini-speaking';
      if (labelEl) labelEl.textContent = 'Silent';
      if (fillEl) fillEl.style.width = '0%';
    }
  };
}

// ============================================================================
// Visualization loop
// ============================================================================
function sizeMidiStack() {
  var stack = document.getElementById('midiStack');
  if (!stack) return;
  var totalH = stack.clientHeight;
  if (totalH < 100) return;
  // Proportions: waterfall 5, keyboard 2.5, grand staff 4 = 11.5 total
  var rollH = Math.round(totalH * 5 / 11.5);
  var kbH = Math.round(totalH * 2.5 / 11.5);
  var staffH = totalH - rollH - kbH;
  document.getElementById('rollWrap').style.height = rollH + 'px';
  document.getElementById('keyboardWrap').style.height = kbH + 'px';
  document.getElementById('staffWrap').style.height = staffH + 'px';
}

function drawLoop() {
  if (!sessionActive) return;
  sizeMidiStack();
  drawPianoRoll();
  drawGrandStaff();
  drawKeyboard();
  updateLevelMeter();
  animFrame = requestAnimationFrame(drawLoop);
}

function drawPianoRoll() {
  var canvas = document.getElementById('pianoRollCanvas');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  if (!rect.width) return;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var W = rect.width;
  var H = rect.height;
  if (H < 50) return;
  var waterfallH = H;  // full height — dynamics moved to keyboard canvas
  var whiteKeyW = W / WHITE_KEYS_COUNT;
  var blackKeyW = whiteKeyW * 0.65;
  var pixelsPerMs = waterfallH / 5000;
  var nowMs = Date.now();
  var bpm = parseInt(bpmSlider.value, 10) || 90;
  var msPerBeat = 60000 / bpm;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, waterfallH);

  ctx.strokeStyle = '#24243C';
  ctx.lineWidth = 0.5;
  for (var i = 0; i <= WHITE_KEYS_COUNT; i++) {
    var laneX = i * whiteKeyW;
    ctx.beginPath();
    ctx.moveTo(laneX, 0);
    ctx.lineTo(laneX, waterfallH);
    ctx.stroke();
  }

  ctx.strokeStyle = '#2A2A4A';
  ctx.lineWidth = 1;
  KEYBOARD.forEach(function(key) {
    if (!key.isBlack && key.midi % 12 === 0) {
      var x = key.whiteIndex * whiteKeyW;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, waterfallH);
      ctx.stroke();
    }
  });

  KEYBOARD.forEach(function(key) {
    if (!key.isBlack) return;
    var x = (key.whiteIndex + 1) * whiteKeyW - blackKeyW / 2;
    ctx.fillStyle = '#0F1430';
    ctx.fillRect(x, 0, blackKeyW, waterfallH);
  });

  var firstBeatOffset = nowMs % msPerBeat;
  var totalBeats = Math.ceil(5000 / msPerBeat) + 1;
  for (var beat = 0; beat < totalBeats; beat++) {
    var beatTimeAgo = firstBeatOffset + beat * msPerBeat;
    var y = waterfallH - beatTimeAgo * pixelsPerMs;
    if (y < 0 || y > waterfallH) continue;
    var beatIndex = Math.round((nowMs - beatTimeAgo) / msPerBeat);
    ctx.strokeStyle = beatIndex % 4 === 0 ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.05)';
    ctx.lineWidth = beatIndex % 4 === 0 ? 1 : 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  function drawHistory(blackOnly) {
    noteHistory.forEach(function(entry) {
      var keyInfo = KEY_BY_MIDI.get(entry.note);
      if (!keyInfo || keyInfo.isBlack !== blackOnly) return;

      var totalAge = nowMs - entry.startMs;
      if (totalAge > 5000) return;

      var noteX = keyInfo.isBlack
        ? (keyInfo.whiteIndex + 1) * whiteKeyW - blackKeyW / 2
        : keyInfo.whiteIndex * whiteKeyW + 1;
      var noteW = keyInfo.isBlack ? blackKeyW : whiteKeyW - 2;
      var bodyW = noteW * (2 / 3);
      var bodyX = noteX + (noteW - bodyW) / 2;
      var headColor = dynamicsColor(entry.velocity);
      var pedalColor = darkenedColor(entry.velocity, 0.5);

      var fingerEndMs = (entry.fingerDurationMs > 0) ? entry.startMs + entry.fingerDurationMs : null;
      var finalEndMs = entry.endMs || nowMs;

      function drawSegment(segStartMs, segEndMs, color) {
        var ageStart = nowMs - segStartMs;
        var ageEnd = nowMs - segEndMs;
        var yBottom = segEndMs === nowMs ? waterfallH : waterfallH - ageEnd * pixelsPerMs;
        var yTop = waterfallH - ageStart * pixelsPerMs;
        if (yBottom < 0 || yTop > waterfallH) return;

        var clampedTop = Math.max(0, yTop);
        var clampedBottom = Math.min(waterfallH, yBottom);
        var noteH = clampedBottom - clampedTop;
        if (noteH < 1) return;

        ctx.fillStyle = color;
        ctx.fillRect(bodyX, clampedTop, bodyW, noteH);
      }

      if (fingerEndMs && fingerEndMs < finalEndMs) {
        drawSegment(entry.startMs, fingerEndMs, headColor);
        drawSegment(fingerEndMs, finalEndMs, pedalColor);
      } else {
        drawSegment(entry.startMs, finalEndMs, headColor);
      }

      var headY = waterfallH - totalAge * pixelsPerMs;
      if (headY >= 0 && headY <= waterfallH) {
        ctx.fillStyle = headColor;
        ctx.fillRect(noteX, Math.max(0, headY), noteW, 2);
        ctx.fillStyle = dynamicsColor(entry.velocity, Math.min(0.35, (entry.velocity / 127) * 0.35));
        ctx.fillRect(noteX, Math.max(0, headY), noteW, 1);
      }
    });
  }

  drawHistory(false);
  drawHistory(true);

  // Target notes flowing down from top
  var targetTempo = parseInt(document.getElementById('bpmSlider').value, 10) || 90;
  var targetMsPerBeat = 60000 / targetTempo;
  for (var ti = 0; ti < targetNotes.length; ti++) {
    var tn = targetNotes[ti];
    var timeUntilArrive = tn.arriveMs - nowMs;
    if (timeUntilArrive < -500) continue;
    if (timeUntilArrive > 5000) continue;

    var keyInfo = KEY_BY_MIDI.get(tn.midi);
    if (!keyInfo) continue;

    var tnX = keyInfo.isBlack
      ? (keyInfo.whiteIndex + 1) * whiteKeyW - blackKeyW / 2
      : keyInfo.whiteIndex * whiteKeyW + 1;
    var tnW = keyInfo.isBlack ? blackKeyW : whiteKeyW - 2;
    // Target arrives at waterfallH (bottom), comes down from top
    var tnY = waterfallH - (-timeUntilArrive) * pixelsPerMs;
    var tnH = Math.max(4, tn.durationBeats * targetMsPerBeat * pixelsPerMs);

    if (tnY + tnH < 0 || tnY > waterfallH) continue;

    var tnAlpha = tn.hit ? 0.15 : 0.4;
    ctx.strokeStyle = tn.hit ? 'rgba(0,200,100,' + tnAlpha + ')' : 'rgba(100,150,255,' + tnAlpha + ')';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(tnX + 1, Math.max(0, tnY), tnW - 2, tnH);

    // Fill with faint color
    ctx.fillStyle = tn.hit ? 'rgba(0,200,100,0.05)' : 'rgba(100,150,255,0.08)';
    ctx.fillRect(tnX + 1, Math.max(0, tnY), tnW - 2, tnH);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, waterfallH - 1);
  ctx.lineTo(W, waterfallH - 1);
  ctx.stroke();

  var fadeH = waterfallH * 0.1;
  var fadeGrad = ctx.createLinearGradient(0, 0, 0, fadeH);
  fadeGrad.addColorStop(0, '#0a0a0f');
  fadeGrad.addColorStop(1, 'rgba(26,26,46,0)');
  ctx.fillStyle = fadeGrad;
  ctx.fillRect(0, 0, W, fadeH);

}

// ============================================================================
// Grand Staff — diatonic coordinate system (from PianoQuest app)
// ============================================================================

// Staff line MIDI values
var TREBLE_LINE_MIDIS = [64, 67, 71, 74, 77]; // E4, G4, B4, D5, F5
var BASS_LINE_MIDIS   = [43, 47, 50, 53, 57]; // G2, B2, D3, F3, A3

// Key signature data: number of accidentals (positive = sharps, negative = flats)
var KEY_SIG_MAP = {
  'C major': 0, 'A minor': 0,
  'G major': 1, 'E minor': 1,
  'D major': 2, 'B minor': 2,
  'A major': 3, 'F# minor': 3,
  'E major': 4, 'C# minor': 4,
  'B major': 5,
  'F major': -1, 'D minor': -1,
  'Bb major': -2, 'G minor': -2,
  'Eb major': -3, 'C minor': -3,
  'Ab major': -4, 'F minor': -4
};

// Sharp positions on staff (MIDI values for treble and bass)
var TREBLE_SHARP_POS = [77, 72, 79, 74, 69, 76, 71]; // F5, C5, G5(above), D5, A4, E5, B4
var BASS_SHARP_POS   = [53, 48, 55, 50, 45, 52, 47]; // F3, C3, G3, D3, A2, E3, B2
var TREBLE_FLAT_POS  = [71, 76, 69, 74, 67, 72, 65]; // B4, E5, A4, D5, G4, C5, F4
var BASS_FLAT_POS    = [47, 52, 45, 50, 43, 48, 41]; // B2, E3, A2, D3, G2, C3, F2

// Semitones affected by key signature
function getKeySigSemitones(keyName) {
  var n = KEY_SIG_MAP[keyName] || 0;
  var sharpOrder = [6, 1, 8, 3, 10, 5, 0]; // F#, C#, G#, D#, A#, E#, B#
  var flatOrder  = [10, 3, 8, 1, 6, 11, 4]; // Bb, Eb, Ab, Db, Gb, Cb, Fb
  var set = new Set();
  if (n > 0) { for (var i = 0; i < n; i++) set.add(sharpOrder[i]); }
  else if (n < 0) { for (var i = 0; i < -n; i++) set.add(flatOrder[i]); }
  return set;
}

function isUseFlats(keyName) {
  return (KEY_SIG_MAP[keyName] || 0) < 0;
}

// Target notes for practice — flowing from right on grand staff, from top on waterfall
var targetNotes = [];
var targetNoteTimer = null;
var staffStartTime = 0;

function startTargetNotes() {
  staffStartTime = Date.now();
  targetNotes = [];
}

function addTargetNote(midi, beatIndex, durationBeats) {
  var tempo = parseInt(document.getElementById('bpmSlider').value, 10) || 90;
  var msPerBeat = 60000 / tempo;
  targetNotes.push({
    midi: midi,
    beatIndex: beatIndex,
    arriveMs: staffStartTime + beatIndex * msPerBeat,
    durationBeats: durationBeats || 1,
    hit: false
  });
}

function diatonicIndex(midi) {
  var octave = Math.floor(midi / 12) - 1;
  var n = midi % 12;
  var diatonic;
  switch (n) {
    case 0: case 1: diatonic = 0; break;
    case 2: case 3: diatonic = 1; break;
    case 4: diatonic = 2; break;
    case 5: case 6: diatonic = 3; break;
    case 7: case 8: diatonic = 4; break;
    case 9: case 10: diatonic = 5; break;
    case 11: diatonic = 6; break;
    default: diatonic = 0;
  }
  return octave * 7 + diatonic;
}

function isBlackKey(midi) {
  return BLACK_KEY_PATTERN[midi % 12];
}

function drawGrandStaff() {
  var canvas = document.getElementById('grandStaffCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  if (!rect.width) return;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var W = rect.width;
  var H = rect.height;
  if (H < 50) return;

  // Read settings
  var tempo = parseInt(document.getElementById('bpmSlider').value, 10) || 90;
  var timeSig = (document.getElementById('staffTimeSig').value || '4/4').split('/');
  var beatsPerMeasure = parseInt(timeSig[0], 10) || 4;
  var beatUnit = parseInt(timeSig[1], 10) || 4;
  var scaleName = document.getElementById('staffScale').value || 'C major';
  var keySigNum = KEY_SIG_MAP[scaleName] || 0;
  var useFlats = keySigNum < 0;
  var keySigSemitones = getKeySigSemitones(scaleName);
  var msPerBeat = 60000 / tempo;
  var msPerMeasure = msPerBeat * beatsPerMeasure;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H);

  // Diatonic layout: fill canvas from C8 (y=0, top) to A0 (y=H, bottom)
  var highestDi = diatonicIndex(108); // C8
  var lowestDi = diatonicIndex(21);   // A0
  var totalDiRange = highestDi - lowestDi; // 51 diatonic steps
  var halfStep = H / totalDiRange;
  var lineSpacing = halfStep * 2;

  var trebleTopDi = diatonicIndex(TREBLE_LINE_MIDIS[4]);
  var trebleBottomDi = diatonicIndex(TREBLE_LINE_MIDIS[0]);

  function midiToY(midi) {
    var di = diatonicIndex(midi);
    return (highestDi - di) * halfStep;
  }

  // Layout zones
  var clefW = 24;
  var timeSigW = 16;
  var keySigW = Math.abs(keySigNum) * 10 + 4;
  var marginLeft = clefW + timeSigW + keySigW + 4;
  var playLineX = marginLeft + (W - marginLeft) * 0.5; // center of staff
  var nowMs = Date.now();

  // Draw staff lines
  ctx.strokeStyle = '#555555';
  ctx.lineWidth = 1;
  var trebleTop, trebleBottom, bassTop, bassBottom;
  for (var t = 0; t < TREBLE_LINE_MIDIS.length; t++) {
    var y = midiToY(TREBLE_LINE_MIDIS[t]);
    if (t === 0) trebleBottom = y;
    if (t === 4) trebleTop = y;
    ctx.beginPath(); ctx.moveTo(clefW, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (var b = 0; b < BASS_LINE_MIDIS.length; b++) {
    var y = midiToY(BASS_LINE_MIDIS[b]);
    if (b === 0) bassBottom = y;
    if (b === 4) bassTop = y;
    ctx.beginPath(); ctx.moveTo(clefW, y); ctx.lineTo(W, y); ctx.stroke();
  }

  var middleCY = midiToY(60);

  // Clef and time signature references
  var trebleMidY = (trebleTop + trebleBottom) / 2;
  var bassMidY = (bassTop + bassBottom) / 2;
  var trebleG4Y = midiToY(67); // G4 — treble clef reference line
  var bassF3Y = midiToY(53); // F3 — bass clef reference line
  var staffH = trebleBottom - trebleTop; // pixel height of one staff

  // Treble clef — Unicode 𝄞, centered on G4 line
  ctx.fillStyle = '#AAAAAA';
  var trebleClefSize = Math.round(staffH * 0.924);
  ctx.font = trebleClefSize + 'px serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('\uD834\uDD1E', 4, trebleG4Y);
  // Bass clef — Unicode 𝄢, dots straddle F3 line (4th line from bottom)
  // Move one note below previous position so dot sits on F3
  var bassClefSize = Math.round(staffH * 1.008);
  ctx.font = bassClefSize + 'px serif';
  var bassLineSpacing = (bassBottom - bassTop) / 4;
  // Position so the two dots of 𝄢 straddle the F3 line (3rd line = index 3)
  var bassF3LineY = midiToY(53); // F3 = 4th line from bottom
  var bassClefY = bassF3LineY + bassLineSpacing; // shift down one note
  ctx.fillText('\uD834\uDD22', 6, bassClefY);
  ctx.textBaseline = 'alphabetic';

  // Time signature — to the RIGHT of clefs
  var tsX = clefW + 8;
  var tsFontSize = Math.round(staffH * 0.48);
  ctx.font = 'bold ' + tsFontSize + 'px DM Sans, sans-serif';
  ctx.fillStyle = '#999999';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Treble staff: top number centered between lines 3(B4) and 5(F5), bottom between 1(E4) and 3(B4)
  var trebleLine3Y = midiToY(TREBLE_LINE_MIDIS[2]); // B4
  ctx.fillText(timeSig[0], tsX + 6, (trebleTop + trebleLine3Y) / 2);
  ctx.fillText(timeSig[1], tsX + 6, (trebleLine3Y + trebleBottom) / 2);
  // Bass staff: top between lines 3(D3) and 5(A3), bottom between 1(G2) and 3(D3)
  var bassLine3Y = midiToY(BASS_LINE_MIDIS[2]); // D3
  ctx.fillText(timeSig[0], tsX + 6, (bassTop + bassLine3Y) / 2);
  ctx.fillText(timeSig[1], tsX + 6, (bassLine3Y + bassBottom) / 2);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Key signature accidentals
  var ksX = clefW + timeSigW;
  var absKeySig = Math.abs(keySigNum);
  if (absKeySig > 0) {
    var symbol = useFlats ? '\u266D' : '\u266F';
    var treblePos = useFlats ? TREBLE_FLAT_POS : TREBLE_SHARP_POS;
    var bassPos = useFlats ? BASS_FLAT_POS : BASS_SHARP_POS;
    ctx.font = '11px serif';
    ctx.fillStyle = '#999999';
    for (var i = 0; i < absKeySig; i++) {
      var x = ksX + i * 10;
      ctx.fillText(symbol, x, midiToY(treblePos[i]) + 4);
      ctx.fillText(symbol, x, midiToY(bassPos[i]) + 4);
    }
  }

  // Play line (where notes arrive)
  ctx.strokeStyle = 'rgba(0, 200, 100, 0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(playLineX, trebleTop - 10);
  ctx.lineTo(playLineX, bassBottom + 10);
  ctx.stroke();

  // Flowing measure bar lines — scroll from right to left
  // Fixed measure width: always show ~4 measures; BPM controls scroll speed
  var scrollableW = W - playLineX;
  var measuresVisible = 4;
  var measureDurationMs = msPerMeasure;
  var measureWidthPx = scrollableW / measuresVisible;
  var pxPerMs = measureWidthPx / measureDurationMs;
  var scrollWindow = scrollableW / pxPerMs;
  var firstMeasureOffset = nowMs % measureDurationMs;
  var totalMeasures = Math.ceil(scrollWindow / measureDurationMs) + 2;

  for (var m = -1; m < totalMeasures; m++) {
    var measureAge = firstMeasureOffset + m * measureDurationMs;
    var barX = playLineX + (scrollWindow - measureAge) * pxPerMs;
    if (barX < marginLeft || barX > W) continue;

    // Measure bar line across both staves
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(barX, trebleTop);
    ctx.lineTo(barX, trebleBottom);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(barX, bassTop);
    ctx.lineTo(barX, bassBottom);
    ctx.stroke();

    // Beat subdivisions within measure
    for (var beat = 1; beat < beatsPerMeasure; beat++) {
      var beatX = barX - beat * (measureDurationMs / beatsPerMeasure) * pxPerMs;
      if (beatX < marginLeft || beatX > W) continue;
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(beatX, trebleTop);
      ctx.lineTo(beatX, trebleBottom);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(beatX, bassTop);
      ctx.lineTo(beatX, bassBottom);
      ctx.stroke();
    }
  }

  // Middle C ledger line reference (faint dashed)
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(marginLeft, middleCY);
  ctx.lineTo(W, middleCY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Helpers
  var noteRadius = Math.max(3, lineSpacing * 0.4);

  function drawLedgerLines(noteX, noteY) {
    ctx.strokeStyle = '#555555';
    ctx.lineWidth = 1;
    var ledgerHalf = 10;
    if (Math.abs(noteY - middleCY) < halfStep) {
      ctx.beginPath();
      ctx.moveTo(noteX - ledgerHalf, middleCY);
      ctx.lineTo(noteX + ledgerHalf, middleCY);
      ctx.stroke();
    }
    if (noteY < trebleTop - halfStep * 0.5) {
      var ly = trebleTop - lineSpacing;
      while (ly >= noteY - halfStep * 0.5) {
        ctx.beginPath(); ctx.moveTo(noteX - ledgerHalf, ly); ctx.lineTo(noteX + ledgerHalf, ly); ctx.stroke();
        ly -= lineSpacing;
      }
    }
    if (noteY > bassBottom + halfStep * 0.5) {
      var ly = bassBottom + lineSpacing;
      while (ly <= noteY + halfStep * 0.5) {
        ctx.beginPath(); ctx.moveTo(noteX - ledgerHalf, ly); ctx.lineTo(noteX + ledgerHalf, ly); ctx.stroke();
        ly += lineSpacing;
      }
    }
  }

  function drawNoteHead(noteX, noteY, color, radius) {
    ctx.beginPath();
    ctx.arc(noteX, noteY, radius, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawStem(noteX, noteY, color, radius) {
    var stemUp = noteY > middleCY;
    var stemLen = lineSpacing * 3.5;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    if (stemUp) {
      ctx.moveTo(noteX + radius - 1, noteY);
      ctx.lineTo(noteX + radius - 1, noteY - stemLen);
    } else {
      ctx.moveTo(noteX - radius + 1, noteY);
      ctx.lineTo(noteX - radius + 1, noteY + stemLen);
    }
    ctx.stroke();
  }

  function drawAccidental(noteX, noteY, midi, color) {
    var semitone = midi % 12;
    if (!isBlackKey(midi)) return;
    // Skip if already in key signature
    if (keySigSemitones.has(semitone)) return;
    var symbol = useFlats ? '\u266D' : '\u266F';
    ctx.font = '11px serif';
    ctx.fillStyle = color;
    ctx.fillText(symbol, noteX - noteRadius - 11, noteY + 4);
  }

  // --- TARGET NOTES flowing from right ---
  for (var ti = 0; ti < targetNotes.length; ti++) {
    var tn = targetNotes[ti];
    var timeUntilArrive = tn.arriveMs - nowMs;
    if (timeUntilArrive < -2000) continue; // past and gone
    if (timeUntilArrive > scrollWindow) continue; // not visible yet

    var tnX = playLineX + timeUntilArrive * pxPerMs;
    if (tnX < marginLeft || tnX > W) continue;

    var tnY = midiToY(tn.midi);
    var tnAlpha = tn.hit ? 0.15 : (timeUntilArrive < 0 ? Math.max(0.2, 1 + timeUntilArrive / 2000) : 0.6);
    var tnColor = tn.hit ? 'rgba(0,200,100,' + tnAlpha + ')' : 'rgba(100,150,255,' + tnAlpha + ')';

    drawLedgerLines(tnX, tnY);
    drawAccidental(tnX, tnY, tn.midi, tnColor);
    // Hollow note head for targets
    ctx.beginPath();
    ctx.arc(tnX, tnY, noteRadius, 0, Math.PI * 2);
    ctx.strokeStyle = tnColor;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // --- PLAYED NOTES (active) — head scrolls left from play line, tail extends to play line ---
  activeNotes.forEach(function(noteData, midi) {
    if (midi < FIRST_MIDI || midi > FIRST_MIDI + TOTAL_KEYS - 1) return;
    var noteY = midiToY(midi);
    // Always bright while sounding (active), regardless of finger/pedal
    var color = dynamicsColor(noteData.velocity);
    var holdMs = nowMs - noteData.timestamp;
    var headPx = holdMs * pxPerMs; // head moves left at tempo speed
    var headX = Math.max(marginLeft, playLineX - headPx);

    // Draw tail from head to play line — always bright while active
    var tailLen = playLineX - headX;
    if (tailLen > 2) {
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.roundRect(headX, noteY - noteRadius * 0.7, tailLen, noteRadius * 1.4, noteRadius * 0.7);
      ctx.fill();
      ctx.globalAlpha = 1.0;
    }

    drawLedgerLines(headX, noteY);
    drawAccidental(headX, noteY, midi, color);
    drawNoteHead(headX, noteY, color, noteRadius);
  });

  // --- NOTE HISTORY scrolling left from play line at tempo speed ---
  var maxLeftPx = playLineX - marginLeft;
  for (var i = noteHistory.length - 1; i >= 0; i--) {
    var entry = noteHistory[i];
    var age = nowMs - entry.startMs;
    var offsetPx = age * pxPerMs; // same speed as measure bar flow
    if (offsetPx > maxLeftPx) break;
    if (entry.endMs === 0) continue; // skip currently-active note (drawn at play line)

    var noteY = midiToY(entry.note);
    var noteX = playLineX - offsetPx;
    if (noteX < marginLeft) continue;

    // Draw duration tail for history notes — match waterfall brightness rules
    var duration = (entry.endMs || nowMs) - entry.startMs;
    var durationPx = duration * pxPerMs;
    var tailEndX = Math.min(playLineX, noteX + durationPx);

    var t = offsetPx / maxLeftPx;
    var alpha = Math.max(0.1, 1 - t);
    var headColor = dynamicsColor(entry.velocity, alpha);
    var pedalAlpha = alpha * 0.5;

    if (durationPx > 2) {
      var fingerEndMs = (entry.fingerDurationMs > 0) ? entry.startMs + entry.fingerDurationMs : null;
      if (fingerEndMs && fingerEndMs < entry.endMs) {
        // Finger-held segment: bright (same as waterfall headColor)
        var fingerEndAge = nowMs - fingerEndMs;
        var fingerEndX = Math.min(playLineX, playLineX - fingerEndAge * pxPerMs);
        if (fingerEndX > noteX) {
          ctx.fillStyle = headColor;
          ctx.globalAlpha = alpha * 0.6;
          ctx.beginPath();
          ctx.roundRect(noteX, noteY - noteRadius * 0.7, fingerEndX - noteX, noteRadius * 1.4, noteRadius * 0.7);
          ctx.fill();
        }
        // Pedal-sustained segment: dimmer (same as waterfall pedalColor)
        if (tailEndX > fingerEndX) {
          ctx.fillStyle = dynamicsColor(entry.velocity, pedalAlpha);
          ctx.globalAlpha = pedalAlpha * 0.6;
          ctx.beginPath();
          ctx.roundRect(fingerEndX, noteY - noteRadius * 0.7, tailEndX - fingerEndX, noteRadius * 1.4, noteRadius * 0.7);
          ctx.fill();
        }
        ctx.globalAlpha = 1.0;
      } else {
        // No pedal sustain — all bright
        ctx.fillStyle = headColor;
        ctx.globalAlpha = alpha * 0.6;
        ctx.beginPath();
        ctx.roundRect(noteX, noteY - noteRadius * 0.7, tailEndX - noteX, noteRadius * 1.4, noteRadius * 0.7);
        ctx.fill();
        ctx.globalAlpha = 1.0;
      }
    }

    if (alpha > 0.3) drawLedgerLines(noteX, noteY);
    if (alpha > 0.3) drawAccidental(noteX, noteY, entry.note, dynamicsColor(entry.velocity, alpha * 0.8));
    drawNoteHead(noteX, noteY, headColor, noteRadius * (0.6 + 0.4 * (1 - t)));
  }

  // Left margin overlay to clean up clef area
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, marginLeft - 2, H);

  // Redraw clefs and key sig on top (same as initial draw)
  ctx.fillStyle = '#AAAAAA';
  ctx.textBaseline = 'middle';
  ctx.font = trebleClefSize + 'px serif';
  ctx.fillText('\uD834\uDD1E', 4, trebleG4Y);
  ctx.font = bassClefSize + 'px serif';
  ctx.fillText('\uD834\uDD22', 6, bassClefY);
  ctx.textBaseline = 'alphabetic';

  // Redraw time sig
  ctx.font = 'bold ' + tsFontSize + 'px DM Sans, sans-serif';
  ctx.fillStyle = '#999999';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(timeSig[0], tsX + 6, (trebleTop + trebleLine3Y) / 2);
  ctx.fillText(timeSig[1], tsX + 6, (trebleLine3Y + trebleBottom) / 2);
  ctx.fillText(timeSig[0], tsX + 6, (bassTop + bassLine3Y) / 2);
  ctx.fillText(timeSig[1], tsX + 6, (bassLine3Y + bassBottom) / 2);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Redraw key sig
  if (absKeySig > 0) {
    var symbol = useFlats ? '\u266D' : '\u266F';
    var treblePos = useFlats ? TREBLE_FLAT_POS : TREBLE_SHARP_POS;
    var bassPos = useFlats ? BASS_FLAT_POS : BASS_SHARP_POS;
    ctx.font = '11px serif';
    ctx.fillStyle = '#999999';
    for (var i = 0; i < absKeySig; i++) {
      var x = ksX + i * 10;
      ctx.fillText(symbol, x, midiToY(treblePos[i]) + 4);
      ctx.fillText(symbol, x, midiToY(bassPos[i]) + 4);
    }
  }

  // Redraw staff lines in clef area
  ctx.strokeStyle = '#555555';
  ctx.lineWidth = 1;
  for (var t = 0; t < TREBLE_LINE_MIDIS.length; t++) {
    var y = midiToY(TREBLE_LINE_MIDIS[t]);
    ctx.beginPath(); ctx.moveTo(clefW, y); ctx.lineTo(marginLeft - 2, y); ctx.stroke();
  }
  for (var b = 0; b < BASS_LINE_MIDIS.length; b++) {
    var y = midiToY(BASS_LINE_MIDIS[b]);
    ctx.beginPath(); ctx.moveTo(clefW, y); ctx.lineTo(marginLeft - 2, y); ctx.stroke();
  }
}

function drawKeyboard() {
  var canvas = document.getElementById('keyboardCanvas');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  if (!rect.width) return;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var W = rect.width;
  var totalH = rect.height;
  if (totalH < 50) return;
  var dynamicsH = Math.round(totalH * 0.4); // top 40% for dynamic bars
  var keyboardH = totalH - dynamicsH; // bottom 60% for keys
  var keyTop = dynamicsH; // keys start below dynamics zone
  var whiteKeyW = W / WHITE_KEYS_COUNT;
  var blackKeyW = whiteKeyW * 0.6;
  var blackKeyH = keyboardH * 0.62;

  ctx.clearRect(0, 0, W, totalH);

  // --- Dynamic bars zone (above keyboard) ---
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, dynamicsH);

  // Dynamics guide lines
  ctx.font = 'bold 12px DM Sans, sans-serif';
  DYNAMICS_LABELS.forEach(function(dl) {
    var y = keyTop - (dl.vel / 127) * dynamicsH;
    ctx.strokeStyle = dynamicsColor(dl.vel, 0.5);
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
    ctx.fillStyle = dynamicsColor(dl.vel, 0.7);
    ctx.fillText(dl.label, 3, y - 3);
  });

  // Dynamic bars — grow upward from keyboard top
  function drawDynBars(blackOnly) {
    activeNotes.forEach(function(note, midi) {
      var keyInfo = KEY_BY_MIDI.get(midi);
      if (!keyInfo || keyInfo.isBlack !== blackOnly) return;
      var barH = (note.velocity / 127) * (dynamicsH - 2);
      var barX = keyInfo.isBlack
        ? (keyInfo.whiteIndex + 1) * whiteKeyW - blackKeyW / 2
        : keyInfo.whiteIndex * whiteKeyW + 1;
      var barW = keyInfo.isBlack ? blackKeyW : whiteKeyW - 2;
      var color = fingerDownNotes.has(midi) ? dynamicsColor(note.velocity) : darkenedColor(note.velocity, 0.5);
      if (keyInfo.isBlack) {
        ctx.fillStyle = '#050508';
        ctx.fillRect(barX, 0, barW, dynamicsH);
      }
      ctx.fillStyle = color;
      ctx.fillRect(barX, keyTop - barH, barW, barH);
    });
  }
  drawDynBars(false);
  drawDynBars(true);

  // --- Keyboard keys ---
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, keyTop, W, keyboardH);

  KEYBOARD.forEach(function(key) {
    if (key.isBlack) return;
    var x = key.whiteIndex * whiteKeyW;
    var active = activeNotes.get(key.midi);
    var isPedalOnly = active && !fingerDownNotes.has(key.midi) && pedalSustainedNotes.has(key.midi);

    if (active) {
      ctx.fillStyle = isPedalOnly ? darkenedColor(active.velocity, 0.75) : dynamicsColor(active.velocity);
      ctx.shadowColor = isPedalOnly ? darkenedColor(active.velocity, 0.75) : dynamicsColor(active.velocity);
      ctx.shadowBlur = 10;
    } else {
      ctx.fillStyle = '#e8e8e8';
      ctx.shadowBlur = 0;
    }

    ctx.fillRect(x + 0.5, keyTop, whiteKeyW - 1, keyboardH - 1);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x + 0.5, keyTop, whiteKeyW - 1, keyboardH - 1);
  });

  ctx.shadowBlur = 0;
  KEYBOARD.forEach(function(key) {
    if (!key.isBlack) return;
    var x = (key.whiteIndex + 1) * whiteKeyW - blackKeyW / 2;
    var active = activeNotes.get(key.midi);
    var isPedalOnly = active && !fingerDownNotes.has(key.midi) && pedalSustainedNotes.has(key.midi);

    if (active) {
      ctx.fillStyle = isPedalOnly ? darkenedColor(active.velocity, 0.75) : dynamicsColor(active.velocity);
      ctx.shadowColor = isPedalOnly ? darkenedColor(active.velocity, 0.75) : dynamicsColor(active.velocity);
      ctx.shadowBlur = 10;
    } else {
      ctx.fillStyle = '#111111';
    }

    ctx.fillRect(x, keyTop, blackKeyW, blackKeyH);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, keyTop, blackKeyW, blackKeyH);
  });
}

function updateLevelMeter() {
  if (!analyser) return;
  var data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  var max = 0;
  for (var i = 0; i < data.length; i++) { var v = Math.abs(data[i] - 128); if (v > max) max = v; }
  var pct = Math.min(100, (max / 128) * 100);
  document.getElementById('levelBar').style.width = pct + '%';
  document.getElementById('levelLabel').textContent = Math.round(pct);
}

function loadScoreTree() {

    el.innerHTML = '';
